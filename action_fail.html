<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Failed | HireNest</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --bg: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.1);
            --danger:#ef4444;
            --text:#f8fafc;
            --muted:#94a3b8;
        }

        body{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:var(--bg);
            font-family:'Outfit',sans-serif;
            padding:20px;
            overflow:hidden;
        }

        .card{
            width:100%;
            max-width:420px;
            background:var(--glass);
            backdrop-filter:blur(18px);
            border:1px solid var(--border);
            border-radius:24px;
            padding:40px 32px;
            text-align:center;
            box-shadow:0 25px 50px rgba(0,0,0,0.45);
            animation:fadeUp 0.5s ease;
        }

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .icon{
            width:90px;
            height:90px;
            margin:auto;
            margin-bottom:24px;
            border-radius:50%;
            background:rgba(239,68,68,0.15);
            display:flex;
            align-items:center;
            justify-content:center;
            border:2px solid rgba(239,68,68,0.3);
        }

        .icon svg{
            width:42px;
            height:42px;
            stroke:var(--danger);
        }

        h1{
            color:var(--text);
            font-size:2rem;
            margin-bottom:12px;
            font-weight:600;
        }

        p{
            color:var(--muted);
            line-height:1.6;
            font-size:0.97rem;
            margin-bottom:30px;
        }

        .btn{
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            width:100%;
            padding:14px;
            border:none;
            border-radius:14px;
            background:var(--danger);
            color:white;
            font-size:1rem;
            font-weight:600;
            cursor:pointer;
            transition:0.25s;
            text-decoration:none;
        }

        .btn:hover{
            transform:translateY(-2px);
            background:#dc2626;
        }

        .btn svg{
            width:18px;
            height:18px;
        }

        @media(max-width:480px){

            .card{
                padding:32px 24px;
            }

            h1{
                font-size:1.7rem;
            }

        }

    </style>

</head>
<body>

    <div class="card">

        <div class="icon">

            <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M6 18L18 6M6 6l12 12"/>
            </svg>

        </div>

        <h1>Action Failed</h1>

        <p>
            The requested action could not be completed.
            Please try again or go back to the previous page.
        </p>

        <button class="btn" onclick="history.back()">

            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M15 19l-7-7 7-7"/>
            </svg>

            Go Back

        </button>

    </div>

</body>
</html>
