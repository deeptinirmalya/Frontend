<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | HireNest</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-grad);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h2 {
            margin: 0;
            font-weight: 600;
            font-size: 2rem;
            text-align: center;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .social-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .btn-google {
            background: white;
            color: #1e293b;
        }

        .btn-google:hover {
            background: #f1f5f9;
        }

        .btn-github {
            background: #334155;
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-github:hover {
            background: #1e293b;
        }

        .social-btn img,
        .social-btn i {
            width: 20px;
            margin-right: 12px;
        }

        .divider {
            border-top: 1px solid var(--glass-border);
            margin: 24px 0;
        }

        .input-group {
            margin-bottom: 1.2rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .forgot-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
            margin-top: -8px;
        }

        .forgot-link {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
        }

        .forgot-link:hover {
            color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .signup-link {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .signup-link a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 600;
        }

        /* =========================
           TOAST
        ========================== */

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            min-width: 320px;
            max-width: 380px;
            padding: 16px;
            border-radius: 14px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            color: white;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateX(120%);
            opacity: 0;
            transition: 0.35s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.15);
            border-left: 4px solid var(--danger);
        }

        .toast.success {
            background: rgba(34, 197, 94, 0.15);
            border-left: 4px solid var(--success);
        }

        .toast.warning {
            background: rgba(245, 158, 11, 0.15);
            border-left: 4px solid var(--warning);
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .toast-message {
            color: #e2e8f0;
            font-size: 0.9rem;
        }

        .toast-close {
            cursor: pointer;
            opacity: 0.7;
        }

        .toast-close:hover {
            opacity: 1;
        }

        @media(max-width: 480px) {

            .toast {
                width: calc(100vw - 40px);
                min-width: unset;
            }

            .login-card {
                padding: 1.8rem;
            }

        }
    </style>
</head>

<body>

    <!-- TOAST CONTAINER -->

    <div class="toast-container" id="toastContainer"></div>

    <div class="login-card">

        <h2>Welcome Back</h2>

        <p class="subtitle">
            Sign in to your HireNest account
        </p>

        <!-- SOCIAL LOGIN -->

        <div class="social-container">

            <a href="https://dt20tzx0-8000.inc1.devtunnels.ms/api/v1/auth/google/login?method=login" class="social-btn btn-google">

                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png">

                Continue with Google

            </a>

            <a href="https://dt20tzx0-8000.inc1.devtunnels.ms/api/v1/auth/github/login?method=login" class="social-btn btn-github">

                <i class="fab fa-github"></i>

                Continue with GitHub

            </a>

        </div>

        <div class="divider"></div>

        <!-- LOGIN FORM -->

        <form id="loginForm">

            <div class="input-group">

                <input type="email" id="email" placeholder="Email Address" required>

            </div>

            <div class="input-group">

                <input type="password" id="password" placeholder="Password" required>

            </div>

            <div class="forgot-container">

                <a href="forgot_password.html" class="forgot-link">
                    Forgot Password?
                </a>

            </div>

            <button type="submit" class="btn-submit">
                Sign In
            </button>

        </form>

        <div class="signup-link">

            Don't have an account? <br>

            <a href="signup.html">
                Create a HireNest account
            </a>

        </div>

    </div>

    <script src="auth.js"></script>

    <script>

        // =========================
        // TOAST FUNCTION
        // =========================

        function showToast(type, title, message) {

            const container = document.getElementById('toastContainer');

            const toast = document.createElement('div');

            toast.className = `toast ${type}`;

            let icon = 'fa-circle-info';

            if (type === 'error') {
                icon = 'fa-circle-xmark';
            }

            if (type === 'success') {
                icon = 'fa-circle-check';
            }

            if (type === 'warning') {
                icon = 'fa-triangle-exclamation';
            }

            toast.innerHTML = `
            <i class="fa-solid ${icon}"></i>

            <div class="toast-content">

                <div class="toast-title">
                    ${title}
                </div>

                <div class="toast-message">
                    ${message}
                </div>

            </div>

            <i class="fa-solid fa-xmark toast-close"></i>
        `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('show');
            }, 50);

            const removeToast = () => {

                toast.classList.remove('show');

                setTimeout(() => {
                    toast.remove();
                }, 300);

            };

            toast.querySelector('.toast-close')
                .addEventListener('click', removeToast);

            setTimeout(removeToast, 5000);

        }

        // =========================
        // URL PARAM HANDLER
        // =========================

        const params = new URLSearchParams(window.location.search);

        const error = params.get('error');

        if (error) {

            switch (error) {

                case 'INVALID_CREDENTIALS':

                    showToast(
                        'error',
                        'Login Failed',
                        'Incorrect email or password.'
                    );

                    break;

                case 'user_not_found':

                    showToast(
                        'error',
                        'User Not Found',
                        'No account exists with this email.'
                    );

                    break;

                case 'OAUTH_FAILED':

                    showToast(
                        'error',
                        'OAuth Failed',
                        'Unable to authenticate with provider.'
                    );

                    break;

                default:

                    showToast(
                        'error',
                        'Authentication Error',
                        'Something went wrong during login.'
                    );

            }

        }

        // =========================
        // LOGIN FORM
        // =========================

        document.getElementById('loginForm')
            .addEventListener('submit', async (e) => {

                e.preventDefault();

                const email = document.getElementById('email').value.trim();

                const password = document.getElementById('password').value;

                try {

                    const res = await fetch(

                        `${typeof API_BASE !== 'undefined'
                            ? API_BASE
                            : 'http://localhost:8000/api/v1'
                        }/auth/login`,

                        {
                            method: 'POST',

                            credentials: 'include',

                            headers: {
                                'Content-Type': 'application/json',
                                'X-Requested-With': 'XMLHttpRequest'
                            },

                            body: JSON.stringify({
                                identifier: email,
                                password: password
                            })

                        }

                    );

                    // SAFE JSON PARSE

                    let data = {};

                    try {

                        data = await res.json();

                    }
                    catch {

                        data = {};

                    }

                    console.log(data);

                    // =========================
                    // SUCCESS
                    // =========================

                    if (res.ok && data.success) {

                        const role = data.data?.role;

                        showToast(
                            'success',
                            'Login Successful',
                            'Redirecting...'
                        );

                        setTimeout(() => {

                            // CONTRIBUTOR

                            if (
                                role === 'contributor' ||
                                role === 'CONTRIBUTOR'
                            ) {

                                window.location.href =
                                    'contributor_profile.html';

                                return;
                            }

                            // ORGANIZATION

                            if (
                                role === 'organization' ||
                                role === 'ORGANIZATION'
                            ) {

                                window.location.href =
                                    'organization_profile.html';

                                return;
                            }

                            // FALLBACK

                            window.location.href =
                                'action_failed.html';

                        }, 1000);

                        return;

                    }

                    // =========================
                    // ACCOUNT NOT VERIFIED
                    // =========================

                    if (data.error === 'ACCOUNT_NOT_VERIFIED') {

                        window.location.href = 'account_not_verify.html';

                        return;

                    }

                    // =========================
                    // ACCOUNT BLOCKED
                    // =========================

                    if (data.error === 'ACCOUNT_BLOCKED') {

                        window.location.href = 'account_blocked.html';

                        return;

                    }

                    // =========================
                    // INVALID CREDENTIALS
                    // =========================

                    if (data.error === 'INVALID_CREDENTIALS') {

                        showToast(
                            'error',
                            'Login Failed',
                            'Incorrect email or password.'
                        );

                        return;

                    }

                    // =========================
                    // USER NOT FOUND
                    // =========================

                    if (data.error === 'USER_NOT_FOUND') {

                        showToast(
                            'error',
                            'User Not Found',
                            'No account exists with this email.'
                        );

                        return;

                    }

                    // =========================
                    // FALLBACK ERROR
                    // =========================

                    showToast(
                        'error',
                        'Login Failed',
                        'Unable to sign in right now.'
                    );

                }

                catch (err) {

                    console.error(err);

                    showToast(
                        'error',
                        'Network Error',
                        'Backend server is not responding.'
                    );

                }

            });

    </script>

</body>

</html>
