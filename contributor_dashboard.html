<!-- contributor-profile.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contributor Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #020617 0%, #111827 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #8b5cf6;
            --secondary: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-grad);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        .profile-card {
            width: 100%;
            max-width: 750px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.45);
            display: none;
        }

        .banner {
            height: 220px;
            background: linear-gradient(135deg, #7c3aed, #0ea5e9);
            position: relative;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid #111827;
            object-fit: cover;
            position: absolute;
            left: 40px;
            bottom: -65px;
            background: white;
        }

        .content {
            padding: 90px 40px 40px;
        }

        .name {
            font-size: 34px;
            font-weight: 700;
        }

        .role {
            color: var(--secondary);
            margin-top: 10px;
            text-transform: capitalize;
            font-weight: 600;
        }

        .status {
            display: inline-block;
            margin-top: 15px;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
        }

        .section {
            margin-top: 40px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: white;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
        }

        .label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .value {
            font-size: 17px;
            font-weight: 600;
            word-break: break-word;
        }

        .logout-btn {
            margin-top: 35px;
            padding: 14px 22px;
            border: none;
            border-radius: 12px;
            background: var(--danger);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        #loading {
            color: var(--text-muted);
            font-size: 20px;
        }

        @media(max-width: 600px) {

            .avatar {
                left: 50%;
                transform: translateX(-50%);
            }

            .content {
                text-align: center;
                padding: 90px 25px 30px;
            }
        }
    </style>
</head>

<body>

    <div id="loading">Verifying Secure Session...</div>

    <div class="profile-card" id="dashboard">

        <div class="banner">
            <img id="avatar"
                class="avatar"
                src="https://ui-avatars.com/api/?name=User&background=random">
        </div>

        <div class="content">

            <div class="name" id="name">Contributor</div>

            <div class="role" id="role">Contributor</div>

            <div class="status" id="status">Active</div>

            <div class="section">

                <div class="section-title">Profile Information</div>

                <div class="info-grid">

                    <div class="info-box">
                        <div class="label">Email Address</div>
                        <div class="value" id="email">-</div>
                    </div>

                    <div class="info-box">
                        <div class="label">User ID</div>
                        <div class="value" id="userid">-</div>
                    </div>

                    <div class="info-box">
                        <div class="label">Role</div>
                        <div class="value" id="role2">-</div>
                    </div>

                    <div class="info-box">
                        <div class="label">Account Status</div>
                        <div class="value" id="status2">-</div>
                    </div>

                </div>

                <button class="logout-btn" onclick="logout()">
                    Secure Logout
                </button>

            </div>

        </div>

    </div>

    <script src="auth.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {

            const sessionData = await init();

            if (sessionData && sessionData.success) {

                const profileRes = await fetchSecure("/auth/profile");

                if (profileRes.ok) {

                    const profileData = await profileRes.json();

                    const u = profileData.data;

                    document.getElementById('name').innerText =
                        u.name || "Contributor";

                    document.getElementById('email').innerText =
                        u.email || "N/A";

                    document.getElementById('userid').innerText =
                        u.id || "N/A";

                    document.getElementById('role').innerText =
                        u.role || "Contributor";

                    document.getElementById('role2').innerText =
                        u.role || "N/A";

                    document.getElementById('status').innerText =
                        u.status || "Active";

                    document.getElementById('status2').innerText =
                        u.status || "N/A";

                    if (u.profile_image) {
                        document.getElementById('avatar').src =
                            u.profile_image;
                    }

                    document.getElementById('loading').style.display = 'none';

                    document.getElementById('dashboard').style.display = 'block';

                } else {

                    window.location.href = "login.html";
                }

            } else {

                window.location.href = "login.html";
            }
        });
    </script>

</body>

</html>
