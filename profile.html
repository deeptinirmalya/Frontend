<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Protected Area</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #020617 0%, #1e293b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #8b5cf6;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-grad);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: none;
            /* Hidden until authenticated */
        }

        h1 {
            background: linear-gradient(to right, #38bdf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-top: 0;
        }

        .session-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 1.5rem;
            margin: 2rem 0;
            text-align: left;
            border: 1px solid var(--glass-border);
        }

        .logout-btn {
            padding: 12px 24px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .logout-btn:hover {
            opacity: 0.8;
        }

        #loading {
            font-size: 1.2rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>

    <div id="loading">Verifying Secure Session...</div>

    <div class="dashboard-card" id="dashboard">
        <h1>Welcome to the Vault</h1>
        <p>You have successfully authenticated via strict HttpOnly cookies.</p>

        <div class="session-info">
            <h3>Active Sessions:</h3>
            <ul id="sessionList">
                <!-- Populated by JS -->
            </ul>
        </div>

        <button class="logout-btn" onclick="logout()">Secure Logout</button>
    </div>

    <script src="auth.js"></script>
    <script>
        // Immediately protect the page on load by calling init()
window.addEventListener('DOMContentLoaded', async () => {
    const sessionData = await init();

    if (sessionData && sessionData.success) {
        const profileRes = await fetchSecure("/auth/profile");

        if (profileRes.ok) {
            const profileData = await profileRes.json();

            // Populate the UI
            const list = document.getElementById('sessionList');
            if (profileData.data) {
                const u = profileData.data;
                list.innerHTML = `
                    <li style="margin-bottom: 10px;"><strong>Email:</strong> ${u.email}</li>
                    <li style="margin-bottom: 10px;"><strong>Role:</strong> <span style="text-transform: capitalize; color: var(--primary);">${u.role}</span></li>
                    <li style="margin-bottom: 10px;"><strong>Status:</strong> <span style="color: #4ade80;">${u.status}</span></li>
                `;
            }

            // --- CRITICAL FIX: SHOW THE DASHBOARD ---
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            // ----------------------------------------

        } else {
            window.location.href = "login.html";
        }
    }
});
    </script>
</body>

</html>
