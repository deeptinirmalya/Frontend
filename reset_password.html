<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | HireNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div id="container" class="max-w-md w-full bg-white p-8 rounded-lg shadow-md">
        <div id="loading" class="text-center py-10">Verifying token...</div>
        
        <div id="resetContent" class="hidden">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Create New Password</h2>
            <form id="resetForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">New Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
                    <input type="password" id="confirm_password" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700 transition">Update Password</button>
            </form>
        </div>
        <p id="statusMsg" class="mt-4 text-center text-sm"></p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const statusMsg = document.getElementById('statusMsg');

        // 1. Verify token on page load
        window.addEventListener('DOMContentLoaded', async () => {
            if (!token) {
                showError("Missing reset token.");
                return;
            }

            try {
                const res = await fetch(`http://localhost:8000/api/v1/auth/verify-reset-password-token?token=${token}`);
                if (res.ok) {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('resetContent').classList.remove('hidden');
                } else {
                    showError("Invalid or expired token.");
                }
            } catch (err) {
                showError("Server error. Please try again later.");
            }
        });

        // 2. Submit new password
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            if (password !== confirm_password) {
                statusMsg.innerText = "Passwords do not match!";
                statusMsg.className = "mt-4 text-center text-sm text-red-600";
                return;
            }

            try {
                const response = await fetch(`http://localhost:8000/api/v1/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password, confirm_password })
                });
                const result = await response.json();

                if (response.ok) {
                    statusMsg.className = "mt-4 text-center text-sm text-green-600 font-bold";
                    statusMsg.innerText = "Success! Redirecting to login...";
                    setTimeout(() => window.location.href = "/login.html", 3000);
                } else {
                    statusMsg.innerText = result.detail || "Failed to reset password.";
                    statusMsg.className = "mt-4 text-center text-sm text-red-600";
                }
            } catch (err) {
                statusMsg.innerText = "Network error.";
            }
        });

        function showError(text) {
            document.getElementById('loading').innerText = text;
            document.getElementById('loading').className = "text-red-600 font-semibold";
        }
    </script>
</body>
</html>
