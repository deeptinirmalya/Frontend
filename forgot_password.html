<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | HireNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white p-8 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Forgot Password</h2>
        <p class="text-gray-600 text-sm mb-6 text-center">Enter your email and we'll send you a link to reset your password.</p>
        
        <form id="forgotForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" id="email" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">Send Reset Link</button>
        </form>
        <p id="message" class="mt-4 text-center text-sm"></p>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const msgBox = document.getElementById('message');

            try {
                // Adjust URL to your API host
                const response = await fetch(`http://127.0.0.1:8000/api/v1/auth/forgot-password?email=${encodeURIComponent(email)}`);
                const result = await response.json();

                if (response.ok) {
                    msgBox.className = "mt-4 text-center text-sm text-green-600";
                    msgBox.innerText = result.message;
                } else {
                    msgBox.className = "mt-4 text-center text-sm text-red-600";
                    msgBox.innerText = result.message || result.detail || "Something went wrong.";
                }
            } catch (err) {
                msgBox.innerText = "Connection error.";
            }
        });
    </script>
</body>
</html>
