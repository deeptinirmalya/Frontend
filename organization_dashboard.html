<!-- organization-profile.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organization Profile</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #020617 0%, #111827 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #06b6d4;
            --success: #22c55e;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            background: var(--bg-grad);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        .org-card {
            width: 100%;
            max-width: 850px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.45);
            display: none;
        }

        .top-section {
            padding: 40px;
            background: linear-gradient(135deg, #0891b2, #7c3aed);
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .logo {
            width: 130px;
            height: 130px;
            border-radius: 24px;
            object-fit: cover;
            background: white;
        }

        .org-name {
            font-size: 36px;
            font-weight: 700;
        }

        .org-role {
            margin-top: 10px;
            color: #dbeafe;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .org-status {
            margin-top: 15px;
            display: inline-block;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
        }

        .content {
            padding: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 22px;
        }

        .label {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 10px;
        }

        .value {
            font-size: 17px;
            font-weight: 600;
            word-break: break-word;
        }

        .logout-btn {
            margin-top: 35px;
            padding: 14px 22px;
            border: none;
            border-radius: 12px;
            background: var(--danger);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        #loading {
            color: var(--text-muted);
            font-size: 20px;
        }

        @media(max-width:700px) {

            .top-section {
                justify-content: center;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <div id="loading">Verifying Secure Session...</div>

    <div class="org-card" id="dashboard">

        <div class="top-section">

            <img
                id="logo"
                class="logo"
                src="https://ui-avatars.com/api/?name=ORG&background=random"
            >

            <div>
                <div class="org-name" id="orgName">Organization</div>

                <div class="org-role" id="orgRole">Organization</div>

                <div class="org-status" id="orgStatus">Active</div>
            </div>

        </div>

        <div class="content">

            <div class="grid">

                <div class="box">
                    <div class="label">Organization Email</div>
                    <div class="value" id="email">-</div>
                </div>

                <div class="box">
                    <div class="label">Organization ID</div>
                    <div class="value" id="orgId">-</div>
                </div>

                <div class="box">
                    <div class="label">Role</div>
                    <div class="value" id="role">-</div>
                </div>

                <div class="box">
                    <div class="label">Account Status</div>
                    <div class="value" id="status">-</div>
                </div>

            </div>

            <button class="logout-btn" onclick="logout()">
                Secure Logout
            </button>

        </div>

    </div>

    <script src="auth.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {

            const sessionData = await init();

            if (sessionData && sessionData.success) {

                const profileRes = await fetchSecure("/auth/profile");

                if (profileRes.ok) {

                    const profileData = await profileRes.json();

                    const u = profileData.data;

                    document.getElementById('orgName').innerText =
                        u.organization_name || u.name || "Organization";

                    document.getElementById('email').innerText =
                        u.email || "N/A";

                    document.getElementById('orgId').innerText =
                        u.id || "N/A";

                    document.getElementById('role').innerText =
                        u.role || "N/A";

                    document.getElementById('status').innerText =
                        u.status || "N/A";

                    document.getElementById('orgRole').innerText =
                        u.role || "Organization";

                    document.getElementById('orgStatus').innerText =
                        u.status || "Active";

                    if (u.logo) {
                        document.getElementById('logo').src = u.logo;
                    }

                    document.getElementById('loading').style.display = 'none';

                    document.getElementById('dashboard').style.display = 'block';

                } else {

                    window.location.href = "login.html";
                }

            } else {

                window.location.href = "login.html";
            }
        });
    </script>

</body>

</html>
